<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>営業リスト作成ツール</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&family=Noto+Sans+JP:wght@400;500;700;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="style.css">
<link rel="icon" href="/icon-192.png" type="image/png">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#1a1a2e">
<meta name="apple-mobile-web-app-capable" content="yes">
</head>
<body>
<div class="app-container">
  <!-- ヘッダー -->
  <header class="app-header">
    <h1>📋 営業リスト作成ツール</h1>
    <p class="subtitle">地域 × 業種で企業情報を自動収集</p>
  </header>

  <!-- 検索フォーム -->
  <section class="search-section">
    <div class="search-grid">
      <div class="form-group">
        <label>📍 地域（都道府県）</label>
        <select id="prefectureSelect">
          <option value="">選択してください</option>
          <option value="北海道">北海道</option>
          <option value="青森県">青森県</option><option value="岩手県">岩手県</option>
          <option value="宮城県">宮城県</option><option value="秋田県">秋田県</option>
          <option value="山形県">山形県</option><option value="福島県">福島県</option>
          <option value="茨城県">茨城県</option><option value="栃木県">栃木県</option>
          <option value="群馬県">群馬県</option><option value="埼玉県" selected>埼玉県</option>
          <option value="千葉県">千葉県</option><option value="東京都">東京都</option>
          <option value="神奈川県">神奈川県</option><option value="新潟県">新潟県</option>
          <option value="富山県">富山県</option><option value="石川県">石川県</option>
          <option value="福井県">福井県</option><option value="山梨県">山梨県</option>
          <option value="長野県">長野県</option><option value="岐阜県">岐阜県</option>
          <option value="静岡県">静岡県</option><option value="愛知県">愛知県</option>
          <option value="三重県">三重県</option><option value="滋賀県">滋賀県</option>
          <option value="京都府">京都府</option><option value="大阪府">大阪府</option>
          <option value="兵庫県">兵庫県</option><option value="奈良県">奈良県</option>
          <option value="和歌山県">和歌山県</option><option value="鳥取県">鳥取県</option>
          <option value="島根県">島根県</option><option value="岡山県">岡山県</option>
          <option value="広島県">広島県</option><option value="山口県">山口県</option>
          <option value="徳島県">徳島県</option><option value="香川県">香川県</option>
          <option value="愛媛県">愛媛県</option><option value="高知県">高知県</option>
          <option value="福岡県">福岡県</option><option value="佐賀県">佐賀県</option>
          <option value="長崎県">長崎県</option><option value="熊本県">熊本県</option>
          <option value="大分県">大分県</option><option value="宮崎県">宮崎県</option>
          <option value="鹿児島県">鹿児島県</option><option value="沖縄県">沖縄県</option>
        </select>
      </div>
      <div class="form-group">
        <label>🔍 市区町村（任意）</label>
        <input type="text" id="cityInput" placeholder="例: さいたま市、川口市...">
      </div>
      <div class="form-group">
        <label>🏢 業種</label>
        <input type="text" id="industryInput" placeholder="例: 工務店、歯科医院、美容室..." value="工務店">
      </div>
      <div class="form-group">
        <label>📊 最大取得件数</label>
        <select id="maxResults">
          <option value="20">20件</option>
          <option value="50" selected>50件</option>
          <option value="100">100件</option>
          <option value="200">200件</option>
        </select>
      </div>
    </div>

    <button id="searchBtn" class="btn-search" onclick="startSearch()">
      <span class="btn-icon">🚀</span>
      <span>リスト作成開始</span>
    </button>
  </section>

  <!-- 進捗表示 -->
  <section id="progressSection" class="progress-section hidden">
    <div class="progress-bar-container">
      <div class="progress-bar" id="progressBar" style="width:0%"></div>
    </div>
    <div class="progress-text" id="progressText">準備中...</div>
  </section>

  <!-- 結果サマリー -->
  <section id="summarySection" class="summary-section hidden">
    <div class="summary-grid">
      <div class="summary-card">
        <div class="summary-number" id="totalCount">0</div>
        <div class="summary-label">取得件数</div>
      </div>
      <div class="summary-card">
        <div class="summary-number" id="phoneCount">0</div>
        <div class="summary-label">電話番号あり</div>
      </div>
      <div class="summary-card">
        <div class="summary-number" id="websiteCount">0</div>
        <div class="summary-label">HP あり</div>
      </div>
      <div class="summary-card">
        <div class="summary-number" id="ratingCount">0</div>
        <div class="summary-label">メアドあり</div>
      </div>
    </div>
    <div class="export-buttons">
      <button class="btn-export csv" onclick="exportCSV()">📥 CSVダウンロード</button>
      <button class="btn-export copy" onclick="copyToClipboard()">📋 コピー</button>
    </div>
  </section>

  <!-- 結果テーブル -->
  <section id="resultsSection" class="results-section hidden">
    <div class="table-wrapper">
      <table id="resultsTable">
        <thead>
          <tr>
            <th>#</th>
            <th>会社名</th>
            <th>住所</th>
            <th>電話番号</th>
            <th>メアド</th>
            <th>HP</th>
          </tr>
        </thead>
        <tbody id="resultsBody">
        </tbody>
      </table>
    </div>
  </section>

  <!-- フッター -->
  <footer class="app-footer">
    <p>公開情報のみを収集しています。個人情報は含みません。</p>
  </footer>
</div>

<script src="app.js"></script>
</body>
</html>
